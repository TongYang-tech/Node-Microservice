apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-nodejs-microservice
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-nodejs-microservice
  template:
    metadata:
      labels:
        app: my-nodejs-microservice
    spec:
      containers:
        - name: my-nodejs-microservice
          image: my-app:latest
          imagePullPolicy: IfNotPresent # Only set to Never for local run on minikube
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              port: 8080
              path: "/placeholder/health"
            initialDelaySeconds: 15
          startupProbe:
            httpGet:
              port: 8080
              path: "/placeholder/health"
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              port: 8080
              path: "/placeholder/health"
            initialDelaySeconds: 15
          resources: # dummy values for resource requests and limits
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: secret-volume
              mountPath: "/etc/secrets/mysecret"
      volumes:
        - name: secret-volume
          secret:
            secretName: my-nodejs-microservice-secret

---
apiVersion: v1
kind: Service
metadata:
  name: my-nodejs-microservice
  namespace: default
spec:
  selector:
    app: my-nodejs-microservice
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: NodePort # set to nodePort for local run on minikube
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-nodejs-microservice-sa
  namespace: default
secrets:
  - name: my-nodejs-microservice-secret
    namespace: default
